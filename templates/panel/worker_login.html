{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFFAF7">
  <title>Worker Login · Alambra Nails</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #FFFAF7 0%, #FFF5E8 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(168, 136, 75, 0.15);
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #C9A96E;
      margin-bottom: 8px;
    }
    .logo p {
      color: #8B7355;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      color: #2D2424;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid rgba(201, 169, 110, 0.3);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #C9A96E;
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
    }
    .hint {
      font-size: 0.8rem;
      color: #8B7355;
      margin-top: 4px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #C9A96E, #A8884B);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .messages {
      margin-bottom: 20px;
    }
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .alert-error {
      background: #FEE2E2;
      color: #991B1B;
      border-left: 3px solid #DC2626;
    }
    .alert-success {
      background: #D1FAE5;
      color: #065F46;
      border-left: 3px solid #10B981;
    }
    .alert-warning {
      background: #FEF3C7;
      color: #92400E;
      border-left: 3px solid #F59E0B;
    }
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .logo h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>Alambra Nails</h1>
      <p>Worker Portal</p>
    </div>

    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="post" autocomplete="off">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="nickname">Nickname</label>
        <input 
          type="text" 
          id="nickname" 
          name="nickname" 
          placeholder="maria"
          required
          autofocus
          autocomplete="username"
        >
        <div class="hint">Your public nickname (e.g., maria, ana)</div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
        <div class="hint">Your worker portal password</div>
      </div>

      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</body>
</html>
